name: Deploy Backend to Render

on:
push:
branches:
- master

jobs:
deploy:
runs-on: ubuntu-latest
steps:
- name: Checkout code
uses: actions/checkout@v4

  - name: Install server dependencies
    run: npm install
    working-directory: ./server

  - name: Trigger Render Deploy
    run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
