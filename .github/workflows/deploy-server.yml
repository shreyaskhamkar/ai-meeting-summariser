name: Deploy Backend to Render

on:
push:
branches:
- master

jobs:
deploy:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout code
    uses: actions/checkout@v3

  - name: Install dependencies
    run: |
      cd server
      npm install

  - name: Trigger Render Deploy
    run: |
      curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
```
