name: Client CI

on:
push:
branches: [master]
paths:
- 'client/**'
- '.github/workflows/client-ci.yml'

pull_request:
branches: [master]
paths:
- 'client/**'

jobs:
build-client:
runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v4

  - name: Install client dependencies
    run: |
      cd client
      npm install

  - name: Build client
    run: |
      cd client
      npm run build
